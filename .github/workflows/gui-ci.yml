name: gui-ci

on:
  push:
    branches: [main]
    tags-ignore:
      - '**'
    paths:
      - 'gui/**'
      - 'scripts/build_gui.ps1'
      - '.github/workflows/gui-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'gui/**'
      - 'scripts/build_gui.ps1'
      - '.github/workflows/gui-ci.yml'
  workflow_dispatch:

jobs:
  gui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # setup-node 内置的 pnpm 缓存与 pnpm/action-setup 在 Windows 上偶发冲突，
          # 改为手动缓存 pnpm store。

      - name: Enable corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('gui/tauri/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - uses: dtolnay/rust-toolchain@stable

      - name: Run GUI build flow
        shell: pwsh
        run: ./scripts/build_gui.ps1
